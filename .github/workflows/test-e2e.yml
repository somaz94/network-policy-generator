name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    name: Run on Ubuntu
    # Gate the kind-based e2e on fork PRs: push/dispatch and same-repo PRs
    # always run; a fork PR runs only after a maintainer comments /ok-to-test
    # (which applies the ok-to-test label).
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository ||
      contains(github.event.pull_request.labels.*.name, 'ok-to-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: somaz94/kind-e2e-test-action@v1
