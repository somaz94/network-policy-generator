apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: networkpolicygenerators.security.policy.io
spec:
  group: security.policy.io
  names:
    kind: NetworkPolicyGenerator
    listKind: NetworkPolicyGeneratorList
    plural: networkpolicygenerators
    singular: networkpolicygenerator
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastAnalyzed
      name: LastAnalyzed
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: NetworkPolicyGenerator is the Schema for the networkpolicygenerators
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NetworkPolicyGeneratorSpec defines the desired state of NetworkPolicyGenerator
            properties:
              cidrRules:
                description: CIDRRules defines CIDR-based traffic rules for external
                  IP ranges
                items:
                  description: CIDRRule defines a CIDR-based traffic rule for external
                    IP ranges
                  properties:
                    cidr:
                      description: CIDR is the IP address range (e.g., "10.0.0.0/8",
                        "192.168.1.0/24")
                      type: string
                    direction:
                      description: Direction of the traffic (ingress/egress)
                      enum:
                      - ingress
                      - egress
                      type: string
                    except:
                      description: Except is a list of CIDRs to exclude from the rule
                      items:
                        type: string
                      type: array
                  required:
                  - cidr
                  - direction
                  type: object
                type: array
              dryRun:
                description: |-
                  DryRun when true, generates policies without applying them
                  Generated policies are stored in status.generatedPolicies
                type: boolean
              duration:
                description: Duration specifies how long to analyze traffic in learning
                  mode
                type: string
              globalRules:
                description: GlobalRules defines the global traffic rules
                items:
                  description: GlobalRule defines a single traffic rule
                  properties:
                    direction:
                      description: Direction of the traffic (ingress/egress)
                      enum:
                      - ingress
                      - egress
                      type: string
                    namedPort:
                      description: NamedPort is the port name (e.g., "http", "grpc")
                        as an alternative to numeric port
                      type: string
                    port:
                      description: Port number (1-65535). Either port or namedPort
                        must be specified.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    protocol:
                      description: Protocol (TCP/UDP)
                      enum:
                      - TCP
                      - UDP
                      type: string
                    type:
                      description: Type defines whether to allow or deny this rule
                      enum:
                      - allow
                      - deny
                      type: string
                  required:
                  - direction
                  - protocol
                  - type
                  type: object
                type: array
              mode:
                description: 'Mode specifies the operation mode: "learning" or "enforcing"'
                enum:
                - learning
                - enforcing
                type: string
              policy:
                description: Policy defines the main policy configuration
                properties:
                  allowedNamespaces:
                    description: AllowedNamespaces lists namespaces that are allowed
                      when policy type is deny
                    items:
                      type: string
                    type: array
                  deniedNamespaces:
                    description: DeniedNamespaces lists namespaces that are denied
                      when policy type is allow
                    items:
                      type: string
                    type: array
                  podSelector:
                    additionalProperties:
                      type: string
                    description: |-
                      PodSelector restricts policy to pods matching these labels
                      If empty, applies to all pods in the namespace
                    type: object
                  type:
                    description: Type defines the policy type (allow/deny)
                    enum:
                    - allow
                    - deny
                    type: string
                required:
                - type
                type: object
              policyEngine:
                default: kubernetes
                description: |-
                  PolicyEngine specifies the CNI-specific policy engine to use
                  "kubernetes" generates standard NetworkPolicy (networking.k8s.io/v1)
                  "cilium" generates CiliumNetworkPolicy (cilium.io/v2)
                enum:
                - kubernetes
                - cilium
                - calico
                type: string
              templateName:
                description: |-
                  TemplateName specifies a built-in policy template to use as a base
                  Available templates: zero-trust, web-app, backend-api, database, monitoring
                  Template rules are merged with user-defined globalRules (user rules take precedence)
                enum:
                - zero-trust
                - web-app
                - backend-api
                - database
                - monitoring
                - ""
                type: string
            required:
            - policy
            type: object
          status:
            description: NetworkPolicyGeneratorStatus defines the observed state of
              NetworkPolicyGenerator
            properties:
              appliedPoliciesCount:
                description: AppliedPoliciesCount is the number of currently applied
                  policies
                type: integer
              generatedPolicies:
                description: GeneratedPolicies contains the YAML representation of
                  generated policies (populated in dry-run mode)
                items:
                  type: string
                type: array
              lastAnalyzed:
                description: LastAnalyzed is the timestamp of when traffic was last
                  analyzed
                format: date-time
                type: string
              observedTraffic:
                description: ObservedTraffic contains the list of observed traffic
                  patterns
                items:
                  description: TrafficFlow represents a single observed traffic pattern
                  properties:
                    destNamespace:
                      description: Destination namespace and pod information
                      type: string
                    destPod:
                      type: string
                    port:
                      format: int32
                      type: integer
                    protocol:
                      description: Protocol and port information
                      type: string
                    sourceNamespace:
                      description: Source namespace and pod information
                      type: string
                    sourcePod:
                      type: string
                  type: object
                type: array
              phase:
                description: 'Phase represents the current phase of the generator:
                  Learning, Analyzing, or Enforcing'
                type: string
              policyDiff:
                description: PolicyDiff contains the diff between the current and
                  previously applied policies
                items:
                  description: PolicyDiffEntry represents a single diff entry for
                    policy audit
                  properties:
                    action:
                      description: 'Action is the type of change: Created, Updated,
                        Unchanged'
                      type: string
                    namespace:
                      description: Namespace is the namespace of the policy
                      type: string
                    policyName:
                      description: PolicyName is the name of the policy
                      type: string
                    timestamp:
                      description: Timestamp is when the change was detected
                      format: date-time
                      type: string
                  required:
                  - action
                  - namespace
                  - policyName
                  - timestamp
                  type: object
                type: array
              suggestedNamespaces:
                description: |-
                  SuggestedNamespaces contains namespace names observed during learning mode
                  These can be used as allowedNamespaces when transitioning to enforcing
                items:
                  type: string
                type: array
              suggestedRules:
                description: SuggestedRules contains port/protocol rules observed
                  during learning mode
                items:
                  description: SuggestedRule represents a port/protocol rule suggested
                    by learning mode
                  properties:
                    count:
                      description: Count is the number of times this rule was observed
                      type: integer
                    direction:
                      description: Direction of the traffic (ingress/egress)
                      type: string
                    port:
                      description: Port number observed
                      format: int32
                      type: integer
                    protocol:
                      description: Protocol observed (TCP/UDP)
                      type: string
                  required:
                  - count
                  - direction
                  - port
                  - protocol
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
