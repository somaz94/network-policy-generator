{{- if and .Values.crds.enabled .Values.crds.cleanup }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "network-policy-generator.name" . }}-crd-cleanup
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "network-policy-generator.name" . }}-crd-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "network-policy-generator.name" . }}-crd-cleanup
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "network-policy-generator.name" . }}-crd-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "network-policy-generator.name" . }}-crd-cleanup
    namespace: {{ .Values.namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "network-policy-generator.name" . }}-crd-cleanup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "network-policy-generator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ include "network-policy-generator.name" . }}-crd-cleanup
      containers:
        - name: crd-cleanup
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - delete
            - crd
            - networkpolicygenerators.security.policy.io
            - --ignore-not-found
      restartPolicy: Never
  backoffLimit: 1
{{- end }}
